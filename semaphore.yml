
name: Hello World CI Pipeline

agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004

blocks:
  - name: Run Hello World
    task:
      jobs:
        - name: Say Hello
          commands:
            - checkout
            - echo "Running Hello World script"
            - ls -l
            - cat hello.py
            - python3 Hello_World.py
